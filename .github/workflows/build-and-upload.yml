name: Build and Upload to App Store

# ========================================
# 项目配置 - 修改这里适配不同项目
# ========================================
env:
  # 项目配置
  WORKSPACE_NAME: "keno.xcworkspace"
  SCHEME_NAME: "wldo"
  BUNDLE_ID: "com.keno.com"
  PROVISIONING_PROFILE_NAME: "wldo"
  
  # 构建配置
  CONFIGURATION: "Release"
  XCODE_VERSION: "latest-stable"

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      upload_to_appstore:
        description: '是否上传到App Store Connect'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      submit_for_review:
        description: '上传后是否自动提审'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  
  # 或者在push到main分支时触发
  # push:
  #   branches:
  #     - main
  #   tags:
  #     - 'v*'

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest  # 使用GitHub提供的macOS虚拟机
    
    env:
      # Archive和IPA路径（通常不需要修改）
      ARCHIVE_PATH: "$RUNNER_TEMP/app.xcarchive"
      EXPORT_PATH: "$RUNNER_TEMP/export"
      EXPORT_OPTIONS_PATH: "$RUNNER_TEMP/ExportOptions.plist"
    
    steps:
      - name: 📥 Checkout代码
        uses: actions/checkout@v4
      
      - name: 🔧 设置Xcode版本
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      
      - name: 📦 安装CocoaPods依赖
        run: |
          pod install
      
      - name: 🧹 深度清理（避免任何残留信息）
        run: |
          echo "清理xcuserdata..."
          find . -name "xcuserdata" -type d -exec rm -rf {} + 2>/dev/null || true
          
          echo "清理DerivedData..."
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          
          echo "清理build目录..."
          rm -rf build/
          
          echo "✓ 清理完成"
      
      - name: 🔐 导入证书和Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # 创建临时keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          # 导入证书
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          
          # 导入provisioning profile
          PROVISION_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PROVISION_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROVISION_PATH ~/Library/MobileDevice/Provisioning\ Profiles/
          
          echo "✓ 证书和Profile导入成功"
      
      - name: 🏗️ 构建Archive（无设备关联）
        run: |
          echo "开始构建Archive..."
          
          # 获取Provisioning Profile UUID
          PROVISION_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          UUID=$(strings "$PROVISION_PATH" | grep -A1 "<key>UUID</key>" | tail -n1 | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          echo "使用Provisioning Profile UUID: $UUID"
          echo "PROVISIONING_PROFILE_UUID=$UUID" >> $GITHUB_ENV
          
          # 直接修改工程文件中的Provisioning Profile，避免xcodebuild全局参数导致Pods报错
          echo "修改project.pbxproj..."
          sed -i '' "s/\"PROVISIONING_PROFILE_SPECIFIER\[sdk=iphoneos\*\]\" = wldo;/\"PROVISIONING_PROFILE_SPECIFIER\[sdk=iphoneos\*\]\" = \"$UUID\";/g" keno.xcodeproj/project.pbxproj
          
          xcodebuild archive \
            -workspace ${{ env.WORKSPACE_NAME }} \
            -scheme ${{ env.SCHEME_NAME }} \
            -configuration ${{ env.CONFIGURATION }} \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}"
          
          # 验证archive是否创建成功
          if [ -d "${{ env.ARCHIVE_PATH }}" ]; then
            echo "✓ Archive创建成功: ${{ env.ARCHIVE_PATH }}"
            ls -lh "${{ env.ARCHIVE_PATH }}"
          else
            echo "❌ Archive创建失败！"
            exit 1
          fi
      
      - name: 📤 导出IPA
        run: |
          # 创建ExportOptions.plist
          cat > ${{ env.EXPORT_OPTIONS_PATH }} <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${{ env.BUNDLE_ID }}</key>
                  <string>${{ env.PROVISIONING_PROFILE_UUID }}</string>
              </dict>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            -exportOptionsPlist ${{ env.EXPORT_OPTIONS_PATH }} \
            -exportPath ${{ env.EXPORT_PATH }}
          
          echo "✓ IPA导出成功"
          ls -lh ${{ env.EXPORT_PATH }}/*.ipa
      
      - name: ✅ 验证IPA清洁度
        run: |
          IPA_FILE=$(find $RUNNER_TEMP/export -name "*.ipa" -type f | head -1)
          
          # 解压IPA
          TEMP_DIR=$(mktemp -d)
          unzip -q "$IPA_FILE" -d "$TEMP_DIR"
          
          # 检查是否包含设备信息
          if grep -r "UDID\|DeviceID\|device_id" "$TEMP_DIR" > /dev/null 2>&1; then
            echo "⚠️ 警告: IPA可能包含设备信息"
          else
            echo "✓ IPA验证通过，未发现设备信息"
          fi
          
          rm -rf "$TEMP_DIR"
      
      - name: 📤 上传到App Store Connect
        if: ${{ github.event.inputs.upload_to_appstore == 'true' }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          IPA_FILE=$(find ${{ env.EXPORT_PATH }} -name "*.ipa" -type f | head -1)
          echo "IPA路径: $IPA_FILE"
          
          # ── 方式一：App Store Connect API Key（推荐，支持自动提审）──
          if [ -n "$ASC_KEY_ID" ] && [ -n "$ASC_ISSUER_ID" ] && [ -n "$ASC_PRIVATE_KEY" ]; then
            echo "使用 App Store Connect API Key 上传..."
            API_KEY_PATH=$RUNNER_TEMP/asc_api_key.p8
            echo "$ASC_PRIVATE_KEY" > $API_KEY_PATH
            
            xcrun altool --upload-app \
              --file "$IPA_FILE" \
              --type ios \
              --apiKey "$ASC_KEY_ID" \
              --apiIssuer "$ASC_ISSUER_ID" \
              --verbose
            
            rm -f $API_KEY_PATH
          
          # ── 方式二：Apple ID + App专用密码（备用，不支持自动提审）──
          else
            echo "使用 Apple ID 上传（无 API Key）..."
            xcrun altool --upload-app \
              --file "$IPA_FILE" \
              --type ios \
              --username "$APPLE_ID" \
              --password "$APP_SPECIFIC_PASSWORD" \
              --verbose
          fi
          
          echo "✓ 上传成功！"
      
      - name: 🚀 自动提交审核
        if: ${{ github.event.inputs.upload_to_appstore == 'true' && github.event.inputs.submit_for_review == 'true' }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          if [ -z "$ASC_KEY_ID" ] || [ -z "$ASC_ISSUER_ID" ] || [ -z "$ASC_PRIVATE_KEY" ]; then
            echo "❌ 自动提审需要配置 App Store Connect API Key"
            echo "   请在 GitHub Secrets 中添加："
            echo "   - ASC_KEY_ID      (API Key ID)"
            echo "   - ASC_ISSUER_ID   (Issuer ID)"
            echo "   - ASC_PRIVATE_KEY (AuthKey_XXXXXX.p8 内容)"
            exit 1
          fi
          
          echo "🚀 开始自动提交审核..."
          
          # 写入 API Key 文件
          API_KEY_PATH=$RUNNER_TEMP/asc_api_key.p8
          echo "$ASC_PRIVATE_KEY" > $API_KEY_PATH
          
          # 安装 Fastlane
          echo "安装 Fastlane..."
          gem install fastlane --quiet --no-document
          
          # 使用 Fastlane deliver 提审
          # skip_binary_upload:true 表示不重复上传，只对已上传版本提审
          bundle exec fastlane run deliver \
            submit_for_review:true \
            automatic_release:false \
            force:true \
            api_key_path:"$API_KEY_PATH" \
            app_identifier:"${{ env.BUNDLE_ID }}" \
            skip_binary_upload:true \
            skip_screenshots:true \
            skip_metadata:true \
            precheck_default_rule_level:":off"
          
          rm -f $API_KEY_PATH
          
          echo "✅ 已成功提交审核！"
          echo "   请登录 App Store Connect 查看审核状态："
          echo "   https://appstoreconnect.apple.com/apps"
      
      - name: 📦 保存IPA为Artifact（可选）
        uses: actions/upload-artifact@v4
        with:
          name: lolo-ipa
          path: ${{ env.EXPORT_PATH }}/*.ipa
          retention-days: 7
      
      - name: 🧹 清理临时文件
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f $RUNNER_TEMP/build_certificate.p12
          rm -f $RUNNER_TEMP/build_pp.mobileprovision
          rm -f $RUNNER_TEMP/asc_api_key.p8
          echo "✓ 清理完成"
